<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nian Agent - 启动中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F8F5F0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1A1412;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(90deg, #C23B22, #D4A843);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        .subtitle {
            font-size: 14px;
            color: #A09890;
            margin-bottom: 32px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(194, 59, 34, 0.15);
            border-top-color: #C23B22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: #A09890;
        }
    </style>
</head>
<body>
    <div class="logo">Nian Agent</div>
    <div class="subtitle">本地自动化助手</div>
    <div class="spinner"></div>
    <div class="status">正在启动后端服务...</div>
</body>
</html>
